<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>跨境电商AI工具箱 — MediaCraft</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);color:#e2e8f0;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:30px 20px}
h1{font-size:2em;background:linear-gradient(135deg,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}
.sub{color:#94a3b8;margin-bottom:30px;font-size:0.95em}
.tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:10px 18px;background:#1e293b;border:1px solid #334155;border-radius:8px 8px 0 0;cursor:pointer;color:#94a3b8;font-size:0.9em;transition:.2s}
.tab.active{background:#334155;color:#60a5fa;border-color:#60a5fa}
.tab:hover{color:#e2e8f0}
.panel{display:none;background:#1e293b;border:1px solid #334155;border-radius:0 8px 8px 8px;padding:24px}
.panel.active{display:block}
label{display:block;color:#94a3b8;margin-bottom:6px;font-size:0.9em}
textarea,input[type=text],select{width:100%;padding:10px 14px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:0.95em;margin-bottom:16px;resize:vertical}
textarea:focus,input:focus,select:focus{outline:none;border-color:#60a5fa}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.btn{display:inline-block;background:linear-gradient(135deg,#60a5fa,#34d399);color:#0f172a;padding:12px 28px;border-radius:8px;font-weight:700;border:none;cursor:pointer;font-size:1em;transition:.2s}
.btn:hover{opacity:0.9}
.result{margin-top:20px;background:#0f172a;border-radius:8px;padding:20px;border:1px solid #334155;display:none}
.result h3{color:#34d399;margin-bottom:12px}
.result .item{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #1e293b}
.result .label{color:#94a3b8;font-size:0.85em}
.result .value{color:#e2e8f0;font-size:0.95em}
.issue{background:#451a1a;padding:8px 12px;border-radius:6px;margin:6px 0;border-left:3px solid #f87171}
.issue.high{border-color:#f87171}
.issue.medium{border-color:#fbbf24}
.score{font-size:3em;font-weight:700;text-align:center;padding:10px}
.score.good{color:#34d399}
.score.warn{color:#fbbf24}
.score.bad{color:#f87171}
.loading{text-align:center;padding:20px;color:#94a3b8}
.price{color:#fbbf24;font-weight:700}
.api-badge{display:inline-block;background:#1e3a5f;color:#60a5fa;padding:2px 8px;border-radius:4px;font-size:0.75em;margin-left:8px}
</style>
</head>
<body>
<div class="container">
<h1>跨境电商AI工具箱</h1>
<p class="sub">合规审查 · Listing 格式化 · 利润计算 — 浏览器打开就用，不需要登录</p>

<div class="tabs">
<div class="tab active" onclick="switchTab('compliance')">合规审查</div>
<div class="tab" onclick="switchTab('generator')">Listing 格式化</div>
<div class="tab" onclick="switchTab('profit')">利润计算器</div>
</div>

<!-- Listing 格式化 -->
<div id="generator" class="panel">
<p style="color:#94a3b8;margin-bottom:16px">输入产品信息 → 检查合规 + SEO打分 + 格式化。(不含翻译——翻译请用 DeepL/Google Translate)</p>
<div class="row">
<div><label>目标平台</label><select id="genPlatform"><option value="amazon">Amazon (美国)</option><option value="temu">Temu</option><option value="shopify">Shopify 独立站</option></select></div>
<div><label>产品类目</label><select id="genCategory"><option value="electronics">电子产品</option><option value="home">家居用品</option><option value="fashion">服装时尚</option><option value="beauty">美妆个护</option><option value="sports">运动户外</option><option value="other">其他</option></select></div>
</div>
<label>产品名称（中文）</label>
<input type="text" id="genName" placeholder="例如：便携式蓝牙音箱 防水 续航12小时">
<label>核心卖点（每行一个）</label>
<textarea id="genFeatures" rows="4" placeholder="防水IPX7&#10;蓝牙5.3连接稳定&#10;续航12小时&#10;TWS串联立体声"></textarea>
<label>规格参数</label>
<textarea id="genSpecs" rows="3" placeholder="尺寸：8x8x4cm&#10;重量：180g&#10;电池：2000mAh&#10;材质：ABS+硅胶"></textarea>
<button class="btn" onclick="pulseBtn(this);generateListing()">生成 Listing</button>
<div id="genResult" class="result"></div>
</div>

<!-- 合规审查 -->
<div id="compliance" class="panel">
<h3>检查内容是否符合平台规则和广告法</h3>
<div class="row">
<div><label>目标平台</label><select id="compPlatform">
<option value="amazon">Amazon</option><option value="douyin">抖音</option><option value="tiktok">TikTok</option><option value="xiaohongshu">小红书</option><option value="kuaishou">快手</option><option value="youtube">YouTube</option>
</select></div>
<div><label>内容类型</label><select id="compType"><option value="title">标题</option><option value="script">脚本/文案</option><option value="caption">描述</option></select></div>
</div>
<label>粘贴要检查的内容</label>
<textarea id="compText" rows="5" placeholder="粘贴你的商品标题、描述、广告文案..."></textarea>
<button class="btn" onclick="pulseBtn(this);checkCompliance()">检查合规 <span class="api-badge">$0.02</span></button>
<div id="compResult" class="result"></div>
</div>

<!-- 利润计算器 -->
<div id="profit" class="panel">
<h3>快速计算跨境利润</h3>
<div class="row">
<div><label>进货价 (¥)</label><input type="text" id="prCost" placeholder="1688拿货价"></div>
<div><label>重量 (kg)</label><input type="text" id="prWeight" placeholder="包裹重量"></div>
</div>
<div class="row">
<div><label>目标平台</label><select id="prPlatform"><option value="amazon">Amazon (佣金15%)</option><option value="temu">Temu (全托管)</option><option value="shopify">Shopify (佣金0%)</option></select></div>
<div><label>售价 ($)</label><input type="text" id="prPrice" placeholder="计划卖多少美元"></div>
</div>
<button class="btn" onclick="pulseBtn(this);calcProfit()">计算利润</button>
<div id="prResult" class="result"></div>
</div>

</div>

<script>
// GSAP 动效
gsap.from("h1", { duration: 0.8, y: -30, opacity: 0, ease: "power3.out" });
gsap.from(".sub", { duration: 0.8, y: -20, opacity: 0, delay: 0.2, ease: "power3.out" });
gsap.from(".tabs", { duration: 0.6, opacity: 0, y: 10, delay: 0.4 });
gsap.from(".panel.active", { duration: 0.5, opacity: 0, y: 15, delay: 0.5 });

function animateResult(el) {
  gsap.fromTo(el, { opacity: 0, y: 20, scale: 0.97 }, { duration: 0.4, opacity: 1, y: 0, scale: 1, ease: "back.out(1.2)" });
  // 分数动画
  var scoreEl = el.querySelector(".score");
  if (scoreEl) {
    var target = parseInt(scoreEl.textContent) || 0;
    gsap.fromTo(scoreEl, { innerText: 0 }, { innerText: target, duration: 1, snap: { innerText: 1 }, ease: "power2.out" });
  }
  el.style.display = "block";
}

function pulseBtn(btn) {
  gsap.fromTo(btn, { scale: 1 }, { scale: 0.95, duration: 0.1, yoyo: true, repeat: 1 });
}

var API = "https://mediacraft-api-pucprtuzpc.cn-hangzhou.fcapp.run";

function switchTab(t) {
  document.querySelectorAll(".tab").forEach(function(e){e.classList.remove("active")});
  document.querySelectorAll(".panel").forEach(function(e){e.classList.remove("active")});
  event.target.classList.add("active");
  document.getElementById(t).classList.add("active");
}

async function api(path, body) {
  var r = await fetch(API + path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  return r.json();
}

// Listing 格式化
async function generateListing() {
  var name = document.getElementById("genName").value.trim();
  var features = document.getElementById("genFeatures").value.trim();
  var specs = document.getElementById("genSpecs").value.trim();
  var platform = document.getElementById("genPlatform").value;
  var category = document.getElementById("genCategory").value;
  if (!name) return alert("请填写产品名称");

  var el = document.getElementById("genResult");
  el.style.display = "block"; el.innerHTML = "<div class=loading>检查中...</div>"; animateResult(el);

  var body = name + "\n\n" + features + "\n\n" + specs;
  var [seo, comp] = await Promise.all([
    api("/api/v1/seo-optimize", { title: name, description: features, keywords: name.split(""), platform: platform }),
    api("/api/v1/compliance-check", { text: body, platform: platform, type: "title" }),
  ]);

  var seoScore = seo.score || 70;
  var compScore = comp.score || 100;
  var overall = Math.min(seoScore, compScore);
  var sc = overall >= 90 ? "good" : overall >= 70 ? "warn" : "bad";
  var platNames = { amazon: "Amazon", temu: "Temu", shopify: "Shopify" };

  var issuesHtml = "";
  if (comp.checks && comp.checks.length > 0) {
    issuesHtml = "<div style=margin-top:12px>" + comp.checks.map(function(c){
      return "<div class='issue " + c.severity + "'><b>[" + c.severity.toUpperCase() + "] " + (c.rule||c.label) + "</b>: " + (c.found||"") + " → " + (c.suggestion||"") + "</div>";
    }).join("") + "</div>";
  } else {
    issuesHtml = "<div style=color:#34d399;padding:8px>合规检查通过</div>";
  }

  var tipsHtml = seo.suggestions ? seo.suggestions.slice(0,3).map(function(s){ return "<div style=color:#94a3b8;font-size:0.85em;margin:4px 0> " + s + "</div>"; }).join("") : "";

  el.innerHTML = [
    "<h3>" + platNames[platform] + " Listing 检查报告</h3>",
    "<div style=display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px>",
    "<div style=text-align:center><div class=score " + sc + ">" + overall + "</div><div style=color:#94a3b8>综合评分</div></div>",
    "<div style=display:flex;flex-direction:column;justify-content:center;gap:8px>",
    "<div>SEO 评分: <b style=color:#60a5fa>" + seoScore + "/100</b></div>",
    "<div>合规评分: <b style=color:" + (compScore>80?"#34d399":"#fbbf24") + ">" + compScore + "/100</b></div>",
    "</div></div>",
    "<div class=item><div class=label>商品标题 (请自行翻译后使用)</div><div class=value>" + name + "</div></div>",
    "<div class=item><div class=label>卖点描述</div><div class=value>" + (features||"（未填写）").replace(/\n/g,"<br>") + "</div></div>",
    issuesHtml,
    tipsHtml ? "<div style=margin-top:12px><div class=label>SEO 建议</div>" + tipsHtml + "</div>" : "",
    "<div style=margin-top:8px;color:#64748b;font-size:0.78em">调用: SEO($0.01) + 合规($0.02) = $0.03 | 不含翻译</div>"
  ].join("");
}

// 合规审查
async function checkCompliance() {
  var text = document.getElementById("compText").value.trim();
  if (!text) return alert("请粘贴要检查的内容");
  var platform = document.getElementById("compPlatform").value;
  var type = document.getElementById("compType").value;

  var el = document.getElementById("compResult");
  el.style.display = "block";
  el.innerHTML = "<div class=loading>检查中...</div>";

  var r = await api("/api/v1/compliance-check", { text: text, platform: platform, type: type });
  var sc = r.score >= 90 ? "good" : r.score >= 70 ? "warn" : "bad";

  el.innerHTML = [
    "<h3>合规审查报告</h3>",
    "<div class=score " + sc + ">" + r.score + "/100</div>",
    "<p style=text-align:center;margin-bottom:12px>" + r.verdict + "</p>",
    r.checks && r.checks.length > 0 ? r.checks.map(function(c){ return "<div class='issue " + c.severity + "'><b>[" + c.severity.toUpperCase() + "] " + (c.rule||c.label) + "</b>: " + (c.found||"") + (c.suggestion ? " → " + c.suggestion : "") + "</div>"; }).join("") : "<div style=text-align:center;color:#34d399;padding:20px>合规检查通过</div>"
  ].join("");
}

// 利润计算器
function calcProfit() {
  var cost = parseFloat(document.getElementById("prCost").value) || 0;
  var weight = parseFloat(document.getElementById("prWeight").value) || 0.5;
  var platform = document.getElementById("prPlatform").value;
  var price = parseFloat(document.getElementById("prPrice").value) || 0;

  var rate = 7.2;
  var shippingRates = { "US": 60, "EU": 55, "JP": 40 };
  var shipping = weight * (shippingRates["US"] || 50);
  var costUSD = cost / rate;
  var platFee = { amazon: 0.15, temu: 0, shopify: 0.03 }[platform] || 0;
  var adBudget = price * 0.2;
  var totalCost = costUSD + shipping + (price * platFee) + adBudget;
  var profit = price - totalCost;
  var margin = price > 0 ? (profit / price * 100) : 0;

  var el = document.getElementById("prResult");
  el.style.display = "block";
  el.innerHTML = [
    "<h3>利润分析</h3>",
    "<div style=display:grid;grid-template-columns:1fr 1fr;gap:12px>",
    "<div class=item><div class=label>进货成本</div><div class=value>¥" + cost.toFixed(0) + " ($" + costUSD.toFixed(2) + ")</div></div>",
    "<div class=item><div class=label>物流估算</div><div class=value>$" + shipping.toFixed(2) + "</div></div>",
    "<div class=item><div class=label>平台佣金</div><div class=value>$" + (price * platFee).toFixed(2) + "</div></div>",
    "<div class=item><div class=label>广告预算(20%)</div><div class=value>$" + adBudget.toFixed(2) + "</div></div>",
    "</div>",
    "<div style=margin-top:16px;text-align:center>",
    "<div class=label>总成本</div><div style=font-size:1.5em;color:#f87171>$" + totalCost.toFixed(2) + "</div>",
    "<div class=label style=margin-top:8px>利润</div><div style='font-size:2em;font-weight:700;color:" + (profit>0?"#34d399":"#f87171") + "'>$" + profit.toFixed(2) + " (" + margin.toFixed(1) + "%)</div>",
    "</div>"
  ].join("");
}
</script>
</body>
</html>
