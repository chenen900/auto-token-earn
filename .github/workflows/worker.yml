name: "MediaCraft AI — Multi-Worker"

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run AgentHansa Worker (v2 + Learning + Humanizer)
        env:
          AGENTHANSA_API_KEY: ${{ secrets.AGENTHANSA_API_KEY }}
        run: node agent_hansa_worker.js

      - name: Run dealwork.ai Worker
        env:
          DEALWORK_API_KEY: ${{ secrets.DEALWORK_API_KEY }}
        run: node dealwork_worker.js

      - name: Run Dev.to Content Publisher
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: node devto_worker.js

      - name: Run TaskMarket Worker
        run: node taskmarket_worker.js

      - name: Commit learning data
        run: |
          git config user.name "MediaCraft AI"
          git config user.email "bot@mediacraft.ai"
          git add data/ logs/ --all
          git diff --cached --quiet || git commit -m "[auto] learning update $(date +%Y-%m-%d)"
          git push || true
